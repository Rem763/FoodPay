<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>结果页</title>
  <style>
    body{margin:0;font-family:"PingFang SC","Microsoft YaHei",sans-serif;background:#fff7ed;color:#111827}.wrap{max-width:760px;margin:0 auto;padding:24px}.card{background:#fff;border-radius:20px;padding:20px;box-shadow:0 12px 40px rgba(15,23,42,.08);margin-bottom:14px}.btn{display:inline-block;background:#4f46e5;color:#fff;padding:10px 14px;border-radius:12px;text-decoration:none;font-weight:700}.muted{color:#6b7280}.value{font-size:28px;font-weight:800;color:#4f46e5}.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}.box{padding:16px;border:1px solid #e5e7eb;border-radius:16px}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>通关结果</h1>
      <p class="muted">这里展示本次练习的得分、正确率、星级和奖励。</p>
      <a class="btn" href="/">返回首页</a>
    </div>
    <div class="grid">
      <div class="box"><div class="muted">得分</div><div class="value" id="score">-</div></div>
      <div class="box"><div class="muted">正确率</div><div class="value" id="accuracy">-</div></div>
      <div class="box"><div class="muted">错题数</div><div class="value" id="wrongCount">-</div></div>
      <div class="box"><div class="muted">星级</div><div class="value" id="starLevel">-</div></div>
    </div>
  </div>
  <script>
    fetch('/api/study-stats?userId=1')
      .then(r => r.json())
      .then(data => {
        document.getElementById('score').textContent = data.score ?? 0;
        document.getElementById('accuracy').textContent = (data.accuracyRate ?? 0) + '%';
        document.getElementById('wrongCount').textContent = data.wrongCount ?? 0;
        document.getElementById('starLevel').textContent = data.starLevel ?? '未开始';
      });
  </script>
</body>
</html>
