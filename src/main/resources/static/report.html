<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>学习报告</title>
  <style>
    body{margin:0;font-family:"PingFang SC","Microsoft YaHei",sans-serif;background:#f8fafc;color:#111827}.wrap{max-width:900px;margin:0 auto;padding:24px}.card{background:#fff;border-radius:20px;padding:20px;box-shadow:0 12px 40px rgba(15,23,42,.08);margin-bottom:14px}.btn{display:inline-block;background:#4f46e5;color:#fff;padding:10px 14px;border-radius:12px;text-decoration:none;font-weight:700}.muted{color:#6b7280}.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}.box{border:1px solid #e5e7eb;border-radius:16px;padding:16px}.value{font-size:28px;font-weight:800;color:#4f46e5}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>学习报告</h1>
      <p class="muted">查看本次练习的整体表现和成长情况。</p>
      <a class="btn" href="/">返回首页</a>
    </div>
    <div class="grid">
      <div class="box"><div class="muted">总题数</div><div class="value" id="total">-</div></div>
      <div class="box"><div class="muted">正确数</div><div class="value" id="correct">-</div></div>
      <div class="box"><div class="muted">错题数</div><div class="value" id="wrong">-</div></div>
      <div class="box"><div class="muted">正确率</div><div class="value" id="accuracy">-</div></div>
    </div>
  </div>
  <script>
    fetch('/api/study-stats?userId=1').then(r=>r.json()).then(data => {
      document.getElementById('total').textContent = data.totalQuestions ?? 0;
      document.getElementById('correct').textContent = data.correctCount ?? 0;
      document.getElementById('wrong').textContent = data.wrongCount ?? 0;
      document.getElementById('accuracy').textContent = (data.accuracyRate ?? 0) + '%';
    });
  </script>
</body>
</html>
