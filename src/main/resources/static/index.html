<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>数学闯关乐园</title>
  <style>
    body{margin:0;font-family:"PingFang SC","Microsoft YaHei",sans-serif;background:linear-gradient(135deg,#fff7ed,#eef2ff);color:#111827}.wrap{max-width:1100px;margin:0 auto;padding:24px}.card{background:rgba(255,255,255,.9);border:1px solid #e5e7eb;border-radius:24px;box-shadow:0 20px 60px rgba(15,23,42,.08);padding:24px;margin-bottom:18px}h1{margin:0 0 12px;font-size:32px}p{line-height:1.7;color:#6b7280}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}.item{padding:18px;border-radius:18px;background:#fff;border:1px solid #e5e7eb}a.btn{display:inline-block;text-decoration:none;background:#4f46e5;color:#fff;padding:12px 18px;border-radius:14px;font-weight:700;margin-right:10px;margin-top:8px}.muted{color:#6b7280}@media(max-width:860px){.grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>数学闯关乐园</h1>
      <p>这是一个面向小学生的数学闯关练习系统，支持关卡挑战、自动出题、答题反馈、错题记录与学习统计。</p>
      <a class="btn" href="/levels.html">开始闯关</a>
      <a class="btn" href="/practice.html">直接练习</a>

    </div>

    <div class="grid">
      <div class="item"><strong>关卡体系</strong><div class="muted">按年级和知识点逐步升级</div></div>
      <div class="item"><strong>题型丰富</strong><div class="muted">加减法、乘法、混合运算、应用题</div></div>
      <div class="item"><strong>学习反馈</strong><div class="muted">答题记录、错题本、统计分析</div></div>
    </div>
  </div>
</body>
</html>
