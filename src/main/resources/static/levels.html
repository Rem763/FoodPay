<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>关卡选择</title>
  <style>
    body{margin:0;font-family:"PingFang SC","Microsoft YaHei",sans-serif;background:linear-gradient(135deg,#f8fafc,#ecfeff);color:#111827}.wrap{max-width:1000px;margin:0 auto;padding:24px}.card{background:#fff;border-radius:20px;padding:20px;margin-bottom:14px;box-shadow:0 12px 40px rgba(15,23,42,.08)}.level{padding:18px;border:1px solid #e5e7eb;border-radius:16px;margin-top:12px;background:#fff}.btn{display:inline-block;background:#4f46e5;color:#fff;padding:10px 14px;border-radius:12px;text-decoration:none;font-weight:700}.muted{color:#6b7280}.tag{display:inline-block;background:#ede9fe;color:#5b21b6;padding:4px 10px;border-radius:999px;font-size:12px;font-weight:700;margin-left:8px}.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}.summary{padding:14px;border-radius:16px;background:#f8fafc;border:1px solid #e5e7eb}.value{font-size:28px;font-weight:800;color:#4f46e5}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>关卡选择</h1>
      <p class="muted">选择一个关卡开始练习，关卡越高难度越大。</p>
      <a class="btn" href="/">返回首页</a>
      <a class="btn" href="/report.html" style="margin-left:8px">学习报告</a>
    </div>

    <div class="grid">
      <div class="summary"><div class="muted">当前开放</div><div class="value" id="totalLevels">-</div></div>
      <div class="summary"><div class="muted">已完成</div><div class="value" id="completedLevels">-</div></div>
    </div>

    <div class="card" id="levels">正在加载关卡...</div>
  </div>
  <script>
    fetch('/api/level-progress?userId=1').then(r=>r.json()).then(progress=>{
      document.getElementById('totalLevels').textContent = progress.totalLevels ?? 0;
      document.getElementById('completedLevels').textContent = progress.completedLevels ?? 0;
      document.getElementById('levels').innerHTML = (progress.levels || []).map(l=>`<div class="level"><h3>${l.title}<span class="tag">${l.unlocked ? '已解锁' : '未解锁'}</span></h3><a class="btn" href="/practice.html?levelId=${l.id}">进入练习</a></div>`).join('');
    });
  </script>
</body>
</html>
