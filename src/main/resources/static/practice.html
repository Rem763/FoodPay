<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>答题练习</title>
  <style>
    body{margin:0;font-family:"PingFang SC","Microsoft YaHei",sans-serif;background:linear-gradient(135deg,#eef2ff,#ecfeff);color:#111827}.wrap{max-width:900px;margin:0 auto;padding:24px}.card{background:rgba(255,255,255,.9);border-radius:20px;padding:20px;box-shadow:0 12px 40px rgba(15,23,42,.08);margin-bottom:14px}.q{padding:16px;border:1px solid #e5e7eb;border-radius:16px;margin-top:12px}.btn{background:#4f46e5;color:#fff;border:0;padding:10px 14px;border-radius:12px;font-weight:700;cursor:pointer}.input{padding:10px 12px;border:1px solid #d1d5db;border-radius:12px;font-size:16px;min-width:220px}.muted{color:#6b7280}.ok{color:#16a34a}.err{color:#dc2626}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>练习答题</h1>
      <p class="muted">根据关卡自动生成题目，答完后可查看结果。</p>
      <a class="btn" href="/levels.html" style="text-decoration:none;display:inline-block">返回关卡</a>
    </div>
    <div class="card"><button class="btn" onclick="loadQuestions()">重新生成题目</button><div id="list"></div></div>
  </div>
  <script>
    const params = new URLSearchParams(location.search); const levelId = params.get('levelId') || 1;
    async function loadQuestions(){
      const qs = await fetch(`/api/questions/generated?levelId=${levelId}&count=5`).then(r=>r.json());
      document.getElementById('list').innerHTML = qs.map((q,i)=>`<div class="q"><h3>题目 ${i+1}</h3><p>${q.content}</p><input class="input" id="a${i}" placeholder="请输入答案" /><button class="btn" onclick="submitAns(${q.id ?? 0}, '${q.answer}', ${i})">提交</button><div id="m${i}" class="muted"></div></div>`).join('');
      window.currentQuestions = qs;
    }
    async function submitAns(id, correct, i){
      const userAnswer = document.getElementById('a'+i).value.trim();
      const result = await fetch('/api/answers',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({userId:1,questionId:id,levelId:Number(levelId),userAnswer})}).then(r=>r.json());
      const m = document.getElementById('m'+i); m.textContent = result.message + `（参考答案：${correct}）`; m.className = result.correct ? 'ok' : 'err';
    }
    loadQuestions();
  </script>
</body>
</html>
