<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>错题本</title>
  <style>
    body{margin:0;font-family:"PingFang SC","Microsoft YaHei",sans-serif;background:linear-gradient(135deg,#ecfeff,#eef2ff);color:#111827}.wrap{max-width:900px;margin:0 auto;padding:24px}.card{background:rgba(255,255,255,.92);border-radius:20px;padding:20px;box-shadow:0 12px 40px rgba(15,23,42,.08)}.item{padding:16px;border:1px solid #e5e7eb;border-radius:16px;margin-top:12px}.btn{display:inline-block;background:#4f46e5;color:#fff;padding:10px 14px;border-radius:12px;text-decoration:none;font-weight:700}.muted{color:#6b7280}.tag{display:inline-block;background:#ede9fe;color:#5b21b6;padding:4px 10px;border-radius:999px;font-size:12px;font-weight:700}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>错题本</h1>
      <p class="muted">展示最近答错的题目，方便复习和重练。</p>
      <a class="btn" href="/">返回首页</a>
      <button class="btn" style="border:0;cursor:pointer" onclick="loadWrong()">刷新错题</button>
    </div>
    <div class="card" id="list"></div>
  </div>
  <script>
    async function loadWrong(){
      const data = await fetch('/api/wrong-questions?userId=1').then(r=>r.json());
      document.getElementById('list').innerHTML = data.length ? data.map(item => `<div class="item"><div><span class="tag">关卡 ${item.levelId}</span></div><h3>题目 ID：${item.questionId}</h3><div class="muted">你的答案：${item.userAnswer}</div><div class="muted">提交时间：${item.createdAt || ''}</div></div>`).join('') : '<p class="muted">暂无错题，继续保持！</p>';
    }
    loadWrong();
  </script>
</body>
</html>
